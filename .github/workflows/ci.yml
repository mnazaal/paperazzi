name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install package and dev tools
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: .venv/bin/ruff check src tools tests

      - name: Pyright
        run: .venv/bin/pyright

      - name: Tests with coverage (excluding browser tests)
        env:
          PZI_SKIP_AUTO_START: "1"
        run: .venv/bin/pytest -m "not browser" --cov=pzi --cov-report=term-missing --cov-report=xml -q

      - name: Build browser extension
        run: .venv/bin/python tools/build_extension.py

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Build package
        run: .venv/bin/python -m build

      - name: Check package metadata (twine)
        run: .venv/bin/twine check dist/*.tar.gz dist/*.whl

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/pzi-wheel-smoke
          /tmp/pzi-wheel-smoke/bin/pip install dist/*.whl
          /tmp/pzi-wheel-smoke/bin/pzi --version
          /tmp/pzi-wheel-smoke/bin/python -c "import pzi; print(pzi.__version__)"

  playwright:
    name: Playwright browser tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install package with dev tools (includes playwright)
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: .venv/bin/playwright install chromium firefox

      - name: Browser tests
        env:
          PZI_SKIP_AUTO_START: "1"
        run: .venv/bin/pytest -m "browser" -v

  live:
    name: Live network smoke (non-gating)
    runs-on: ubuntu-24.04
    # Network-dependent metadata paths (Crossref/OpenAlex/S2/Unpaywall) are not
    # exercised by the gating suite. Run them separately and never block a merge
    # on third-party flakiness — regressions still show up as a failed check.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install package and dev tools
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Live smoke tests
        env:
          PZI_LIVE: "1"
          PZI_CONTACT_EMAIL: "pzi-ci@example.com"
        run: .venv/bin/pytest tests/live/ -m "not browser" -q
