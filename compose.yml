services:
  translation-server:
    build:
      context: ./containers/translation-server
      dockerfile: Containerfile
    ports:
      - "1969:1969"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:1969"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8191/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
