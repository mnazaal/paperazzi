# Development compose file for building and testing containers locally.
# The installed pzi tool uses embedded templates (service_templates.py) to
# generate its own compose.yml alongside the user config, not this file.
# Use: podman compose up -d  (from repo root, to test locally).

services:
  translation-server:
    build:
      context: ./containers/translation-server
      dockerfile: Containerfile
    ports:
      - "1969:1969"
    restart: unless-stopped
    mem_limit: 512m
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:exec
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1969"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  flaresolverr:
    profiles: ["flaresolverr"]
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.25
    ports:
      - "8191:8191"
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8191/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
